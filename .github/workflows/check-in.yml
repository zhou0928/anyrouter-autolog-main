name: AnyRouter 自动签到

on:
  # 定时执行：每6小时执行一次（北京时间 0:00, 6:00, 12:00, 18:00）
  schedule:
    - cron: '0 */6 * * *'
  
  # 手动触发
  workflow_dispatch:
  # NOTE: 临时的 push trigger 已移除，恢复为仅 schedule + manual triggers

jobs:
  check-in:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml', '**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          # 直接安装项目需要的运行时依赖，避免构建包时因 flat-layout 导致失败
          python -m pip install "httpx[http2]>=0.24.0" "playwright>=1.40.0" "python-dotenv>=1.0.0" requests
          # 验证关键依赖已安装
          python -m pip show httpx || true
          python -c "import httpx; print('httpx', httpx.__version__)" || true
          python -m pip show requests || true
          python -c "import requests; print('requests', requests.__version__)" || true
          python -m pip list

      - name: 安装 Playwright 浏览器（通过 pip + CLI 安装，以避免 Action 弃用问题）
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          # 安装浏览器及其系统依赖
          python -m playwright install --with-deps

      - name: 校验关键 Secrets
        env:
          ANYROUTER_ACCOUNTS: ${{ secrets.ANYROUTER_ACCOUNTS }}
        run: |
          # Sanitize secret by removing CR/LF to avoid breaking shell conditional when secret contains newlines
          ACCOUNTS_STR=$(echo "$ANYROUTER_ACCOUNTS" | tr -d '\r\n')
          if [ -z "$ACCOUNTS_STR" ]; then
            echo "ERROR: Missing required secret ANYROUTER_ACCOUNTS"; exit 1
          fi
          echo "INFO: ANYROUTER_ACCOUNTS is set (length: $(printf '%s' "$ACCOUNTS_STR" | wc -c))"

      - name: 创建配置文件 (.env)
        env:
          ANYROUTER_ACCOUNTS: ${{ secrets.ANYROUTER_ACCOUNTS }}
          PROVIDERS: ${{ secrets.PROVIDERS }}
          ALWAYS_NOTIFY: ${{ secrets.ALWAYS_NOTIFY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          CUSTOM_SMTP_SERVER: ${{ secrets.CUSTOM_SMTP_SERVER }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DINGDING_WEBHOOK: ${{ secrets.DINGDING_WEBHOOK }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WEIXIN_WEBHOOK: ${{ secrets.WEIXIN_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERPUSHKEY: ${{ secrets.SERVERPUSHKEY }}
        run: |
          # write sanitized values to .env (remove CRLF so each value is a single line)
          echo "ANYROUTER_ACCOUNTS=$(echo "$ANYROUTER_ACCOUNTS" | tr -d '\r\n')" > .env
          [ -n "$PROVIDERS" ] && echo "PROVIDERS=$(echo "$PROVIDERS" | tr -d '\r\n')" >> .env
          [ -n "$ALWAYS_NOTIFY" ] && echo "ALWAYS_NOTIFY=$(echo "$ALWAYS_NOTIFY" | tr -d '\r\n')" >> .env
          [ -n "$EMAIL_USER" ] && echo "EMAIL_USER=$(echo "$EMAIL_USER" | tr -d '\r\n')" >> .env
          [ -n "$EMAIL_PASS" ] && echo "EMAIL_PASS=$(echo "$EMAIL_PASS" | tr -d '\r\n')" >> .env
          [ -n "$CUSTOM_SMTP_SERVER" ] && echo "CUSTOM_SMTP_SERVER=$(echo "$CUSTOM_SMTP_SERVER" | tr -d '\r\n')" >> .env
          [ -n "$EMAIL_TO" ] && echo "EMAIL_TO=$(echo "$EMAIL_TO" | tr -d '\r\n')" >> .env
          [ -n "$DINGDING_WEBHOOK" ] && echo "DINGDING_WEBHOOK=$(echo "$DINGDING_WEBHOOK" | tr -d '\r\n')" >> .env
          [ -n "$FEISHU_WEBHOOK" ] && echo "FEISHU_WEBHOOK=$(echo "$FEISHU_WEBHOOK" | tr -d '\r\n')" >> .env
          [ -n "$WEIXIN_WEBHOOK" ] && echo "WEIXIN_WEBHOOK=$(echo "$WEIXIN_WEBHOOK" | tr -d '\r\n')" >> .env
          [ -n "$PUSHPLUS_TOKEN" ] && echo "PUSHPLUS_TOKEN=$(echo "$PUSHPLUS_TOKEN" | tr -d '\r\n')" >> .env
          [ -n "$SERVERPUSHKEY" ] && echo "SERVERPUSHKEY=$(echo "$SERVERPUSHKEY" | tr -d '\r\n')" >> .env
          echo '--- .env preview (masked, first 120 bytes) ---'
          # Mask values in preview to avoid exposing secrets
          head -c 120 .env | sed -E 's/=(.*)/=****/' || true
          echo '--- secret presence ---'
          [ -n "$PROVIDERS" ] && echo "PROVIDERS set (len: $(echo -n "$PROVIDERS" | tr -d '\r\n' | wc -c))" || echo "PROVIDERS missing"
          [ -n "$ALWAYS_NOTIFY" ] && echo "ALWAYS_NOTIFY set" || echo "ALWAYS_NOTIFY missing"
          [ -n "$EMAIL_USER" ] && echo "EMAIL_USER set" || echo "EMAIL_USER missing"
          [ -n "$EMAIL_PASS" ] && echo "EMAIL_PASS set" || echo "EMAIL_PASS missing"
          [ -n "$PUSHPLUS_TOKEN" ] && echo "PUSHPLUS_TOKEN set" || echo "PUSHPLUS_TOKEN missing"
          [ -n "$DINGDING_WEBHOOK" ] && echo "DINGDING_WEBHOOK set" || echo "DINGDING_WEBHOOK missing"
          [ -n "$FEISHU_WEBHOOK" ] && echo "FEISHU_WEBHOOK set" || echo "FEISHU_WEBHOOK missing"
          [ -n "$WEIXIN_WEBHOOK" ] && echo "WEIXIN_WEBHOOK set" || echo "WEIXIN_WEBHOOK missing"
          [ -n "$SERVERPUSHKEY" ] && echo "SERVERPUSHKEY set" || echo "SERVERPUSHKEY missing"

      - name: 恢复余额状态
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: balance-hash
          path: .
      
      - name: 执行签到
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DINGDING_WEBHOOK: ${{ secrets.DINGDING_WEBHOOK }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WEIXIN_WEBHOOK: ${{ secrets.WEIXIN_WEBHOOK }}
          SERVERPUSHKEY: ${{ secrets.SERVERPUSHKEY }}
          CUSTOM_SMTP_SERVER: ${{ secrets.CUSTOM_SMTP_SERVER }}
        run: |
          python checkin.py

      - name: 保存余额状态
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: balance-hash
          path: balance_hash.txt
          retention-days: 90
